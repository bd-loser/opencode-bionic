name: build-termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build inside termux-docker
        run: |
          # WHY WE DON'T BUILD ON THE BIND MOUNT:
          # Two prior attempts (default user, then --user root) both failed with
          #   EACCES: Permission denied: failed to create temporary file to save lockfile
          #   ENOENT: failed to symlink/link package ... (thousands of these)
          # The image's entrypoint drops privs to `system` regardless of --user,
          # and even when it doesn't, bun's atomic-rename lockfile write across
          # the bind mount is unreliable. So we do all real work inside the
          # container's own filesystem ($BUILD_ROOT) and only copy the final
          # binary back to /workspace for upload-artifact to pick up.
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            termux/termux-docker:aarch64 \
            bash -c '
              set -euo pipefail

              echo "=== diag ==="
              id || true
              echo "HOME=$HOME PREFIX=${PREFIX:-unset}"
              mount | grep -E "workspace|overlay" || true
              (touch /workspace/.write_test && rm -f /workspace/.write_test && echo "workspace: WRITABLE") \
                || echo "workspace: READ-ONLY for this user"
              echo "==========="

              pkg update -y
              pkg install -y git python curl dpkg rsync

              curl -fsSL https://raw.githubusercontent.com/bd-loser/bun-termux/main/scripts/install.sh | bash

              # Copy the checkout into a container-native path where bun install
              # is guaranteed to work (real termux filesystem, not the bind mount).
              BUILD_ROOT="$HOME/opencode"
              mkdir -p "$BUILD_ROOT"
              rsync -a --delete \
                --exclude ".git" \
                --exclude "node_modules" \
                /workspace/ "$BUILD_ROOT/"

              # Run bun install ourselves — the verifier in clean-reinstall.sh
              # trips on monorepo installs (counts only top-level entries in
              # ./node_modules and expects 1000+, but per-workspace hoisting
              # legitimately leaves only ~15-20 there). Setting SKIP_REINSTALL=1
              # tells setup.sh to trust the node_modules we produced here.
              cd "$BUILD_ROOT"
              bun install
              cd -

              OPENCODE_ROOT="$BUILD_ROOT" SKIP_REINSTALL=1 SKIP_SMOKE_TEST=1 bash "$BUILD_ROOT/termux/setup.sh"

              # build-termux.ts (via packages/script/src/index.ts) calls
              # `git branch --show-current` when neither OPENCODE_CHANNEL nor
              # OPENCODE_VERSION is set. We rsynced without .git, so provide
              # them explicitly so the version-detection branch skips git.
              OPENCODE_ROOT="$BUILD_ROOT" \
              OPENCODE_CHANNEL="dev" \
              OPENCODE_VERSION="0.0.0-termux-ci" \
                bash "$BUILD_ROOT/termux/build-opencode-termux.sh"

              BIN="$BUILD_ROOT/packages/opencode/dist/opencode-android-arm64/bin/opencode"
              # `file` isn't in termux-docker's default toolset; use the shell
              # builtin `command -v`/`ls` for existence + basic sanity instead.
              # (Prior runs died here with `bash: line 47: file: command not found`
              # AFTER a successful build + smoke test, which was misleading.)
              [ -x "$BIN" ] || { echo "ERROR: $BIN missing or not executable"; exit 1; }
              ls -la "$BIN"
              head -c 4 "$BIN" | od -An -c | head -1  # ELF magic

              # Publish the artifact into the mount so the runner can upload it.
              # We only need to write ONE file, which minimizes exposure to
              # whatever makes the mount cranky.
              mkdir -p /workspace/artifact
              cp "$BIN" /workspace/artifact/opencode
              chmod 0644 /workspace/artifact/opencode
              ls -la /workspace/artifact/
            '

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-arm64
          path: artifact/opencode
          if-no-files-found: error
