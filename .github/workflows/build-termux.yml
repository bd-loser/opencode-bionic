name: build-termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build inside termux-docker
        run: bash termux/ci/build-on-runner.sh

      - name: Stage artifact for upload
        run: |
          set -eux
          OUT_HOST="$(cd "$GITHUB_WORKSPACE/../out" && pwd)"
          mkdir -p "$GITHUB_WORKSPACE/artifact"
          cp "$OUT_HOST/opencode" "$GITHUB_WORKSPACE/artifact/opencode"
          cp "$OUT_HOST/opencode.sha256" "$GITHUB_WORKSPACE/artifact/opencode.sha256"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-arm64
          path: |
            artifact/opencode
            artifact/opencode.sha256
          if-no-files-found: error
